<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
     initial-scale=1.0">
    <title>BEEF</title>
    <!--Bootstrap-->
    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap-reboot.min.css"/>

    <!--CSS-->
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="styleesheet"stylesheet href="/libs/swiper/swiper-bundle.min.css"/>

    <!--JS-->
    <script src="/js/app.js" defer></script>
    <script src="/libs/swiper/swiper-bundle.min.js" defer></script>
    
</head>

<body>
    
    <div class="main">
        <div class="billboard">
            <div class="billboard-font-beef">
                   <div class="box">
                        <img class="billboard-icon" 
                        src="billboard-icon.png"/>
                        <p class="billboard-text">
                            BEEF MASTER
                        </p>
                   </div>
             </div>
        </div>
    </div>

    <section class="showcase">
        <h2 class="showcase__header">recipe<span>for masters</span></h2>

        <div class="showcase-carousel">
            <div class="showcase__content-wrapper">
                <div class="showcase__content">
                    
                    <div class="swiper-wraper">
                        <div class="swiper-clide showcase-carousel__item">
                            one
                        </div>
                        <div class="swiper-clide showcase-carousel__item">
                            one
                        </div>
                        <div class="swiper-clide showcase-carousel__item">
                            one
                        </div>
                    </div>

                    
                </div>
            </div>

            

        </div>
        <video src="swiper-font.mp4" class="showcase__video" autoplay loop muted></video>
    </section>
    <style>
 @font-face {font-family: lobster; src: url(Lobster.woff2);}

 @font-face {font-family: pobeda-bold; src: url(pobeda-bold.woff2);}
        body, html{
  height: 100%;
}
:root{
  --padding: 120px;
}
*{
  margin: 0;
  padding: 0;
  border: 0;
  color: azure;
}
/*--Main--*/
.main{
  max-width: 100%;
  width: 100%;
  overflow: hidden;
  height: 100vh;
  background-color: black;
}
.billboard {
  background-image: url(background-billboard.png);
  background-size: cover;
  z-index: 0;
  perspective: 1000px;
}  
.billboard-font-beef {
  background-image: url(billboard-beef.png);
  height: 100vh;
  width: 100vw;
  background-size: cover;
  z-index: 0;
}
.box{
  
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 0;
}
.billboard-icon {
  margin-top: 5%;
  width: 422px;
  height: 357px;
} 
.billboard-text{
  text-align: center;
  color: rgb(187, 187, 187);
  font-size: 70px;
  font-family: pobeda-bold;
}
/*---showcase---*/
.showcase{
  background-color: black;
  height: 100%;
  position: relative;
  color: white;
  overflow: hidden;
}
.showcase__video{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-position: cover;
  opacity: .5;
}
.showcase__content-wrapper{
  position: relative;
  z-index: 2;
  height: 100%;
  padding: var(--padding);
}
.showcase__header{
  position: absolute;
  text-align: center;
  width: 100%;
  z-index: 1;
  top: 40px;
  font-family: lobster;
  font-size: 32px;
  opacity: 0.75;
}
.showcase__header span{
  color: aqua;
}
    </style>
    
</body>
</html>
